apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "palaceoftruth.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: {{ include "palaceoftruth.backendReplicas" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ include "palaceoftruth.intOrPercentString" .Values.backend.rollingUpdate.maxUnavailable }}
      maxSurge: {{ include "palaceoftruth.intOrPercentString" .Values.backend.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: {{ include "palaceoftruth.fullname" . }}-backend
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        app: {{ include "palaceoftruth.fullname" . }}-backend
        {{- include "palaceoftruth.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ include "palaceoftruth.registrySecretName" . }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        - name: wait-for-migrations
          image: {{ include "palaceoftruth.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              for attempt in $(seq 1 {{ .Values.migrations.wait.maxAttempts }}); do
                if alembic current 2>&1 | tee /tmp/alembic-current | grep -q "(head)"; then
                  echo "Database migrations are at Alembic head."
                  exit 0
                fi
                echo "Waiting for migration Job {{ include "palaceoftruth.migrationJobName" . }} to bring the database to Alembic head (${attempt}/{{ .Values.migrations.wait.maxAttempts }})."
                cat /tmp/alembic-current || true
                sleep {{ .Values.migrations.wait.sleepSeconds }}
              done
              echo "Timed out waiting for database migrations to reach Alembic head." >&2
              exit 1
          env:
            {{- include "palaceoftruth.dbEnvVars" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: {{ include "palaceoftruth.appSecretName" . }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "palaceoftruth.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- include "palaceoftruth.dbEnvVars" . | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "palaceoftruth.fullname" . }}-config
            - secretRef:
                name: {{ include "palaceoftruth.appSecretName" . }}
          volumeMounts:
            {{- include "palaceoftruth.runtimeVolumeMount" . | nindent 12 }}
            {{- include "palaceoftruth.uploadArtifactVolumeMount" . | nindent 12 }}
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            periodSeconds: {{ .Values.backend.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.startupProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
        {{- include "palaceoftruth.runtimeVolume" . | nindent 8 }}
