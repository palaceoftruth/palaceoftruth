{{- if eq (include "palaceoftruth.valkeySentinelEnabled" .) "true" }}
---
# Headless service required by the StatefulSet for stable pod DNS.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "palaceoftruth.valkeyPrimaryName" . }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
    {{- if .Values.valkey.metrics.enabled }}
    palaceoftruth.io/valkey-metrics: "true"
    {{- end }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ include "palaceoftruth.valkeyPrimaryName" . }}
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    {{- if .Values.valkey.metrics.enabled }}
    - name: metrics
      port: {{ .Values.valkey.metrics.port }}
      targetPort: metrics
    {{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "palaceoftruth.valkeyPrimaryName" . }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "palaceoftruth.valkeyPrimaryName" . }}
  selector:
    matchLabels:
      app: {{ include "palaceoftruth.valkeyPrimaryName" . }}
  template:
    metadata:
      labels:
        app: {{ include "palaceoftruth.valkeyPrimaryName" . }}
        {{- include "palaceoftruth.labels" . | nindent 8 }}
    spec:
      {{- if .Values.valkey.sentinel.primaryReplicaAntiAffinity.enabled }}
      # Keep the named primary apart from every Sentinel-mode replica. This is
      # required rather than preferred so a node failure cannot remove both.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app: {{ include "palaceoftruth.valkeyReplicaName" . }}
      {{- end }}
      initContainers:
        - name: init-config
          image: {{ .Values.valkey.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # The named primary must not keep a stale replicaof rewrite after
              # a pod/IP recycle, or Sentinel cannot discover a healthy master.
              if [ ! -f /data/valkey.conf ]; then
                echo "appendonly yes" > /data/valkey.conf
                echo "appendfilename appendonly.aof" >> /data/valkey.conf
              fi
              sed -i '/^replicaof /d;/^slaveof /d' /data/valkey.conf
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: valkey
          image: {{ .Values.valkey.image }}
          command: ["valkey-server", "/data/valkey.conf"]
          ports:
            - name: redis
              containerPort: 6379
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
        {{- if .Values.valkey.metrics.enabled }}
        {{- include "palaceoftruth.valkeyExporterContainer" (dict "root" . "address" "redis://127.0.0.1:6379") | nindent 8 }}
        {{- end }}
      {{- if and .Values.valkey.metrics.enabled (or .Values.valkey.metrics.existingSecret .Values.valkey.metrics.passwordFileKey) }}
      volumes:
        {{- include "palaceoftruth.valkeyExporterPasswordVolume" . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.valkey.storage.size }}
{{- end }}
