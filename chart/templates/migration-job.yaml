{{- if .Values.migrations.enabled }}
{{- if and .Values.migrations.readiness.enabled (ge (int .Values.migrations.readiness.timeoutSeconds) (int .Values.migrations.activeDeadlineSeconds)) }}
{{- fail "migrations.readiness.timeoutSeconds must be less than migrations.activeDeadlineSeconds" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "palaceoftruth.migrationJobName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: {{ include "palaceoftruth.fullname" . }}-migration
        {{- include "palaceoftruth.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: {{ include "palaceoftruth.registrySecretName" . }}
      {{- if .Values.migrations.readiness.enabled }}
      initContainers:
        - name: wait-for-writable-database
          image: {{ include "palaceoftruth.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "app.wait_for_database"]
          env:
            {{- include "palaceoftruth.dbEnvVars" . | nindent 12 }}
            - name: MIGRATION_DB_WAIT_TIMEOUT_SECONDS
              value: {{ .Values.migrations.readiness.timeoutSeconds | quote }}
            - name: MIGRATION_DB_WAIT_INTERVAL_SECONDS
              value: {{ .Values.migrations.readiness.intervalSeconds | quote }}
            - name: MIGRATION_DB_CONNECT_TIMEOUT_SECONDS
              value: {{ .Values.migrations.readiness.connectTimeoutSeconds | quote }}
          resources:
            {{- toYaml .Values.migrations.readiness.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "palaceoftruth.backendImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          env:
            {{- include "palaceoftruth.dbEnvVars" . | nindent 12 }}
            - name: REDIS_URL
              value: {{ include "palaceoftruth.redisUrl" . | quote }}
          envFrom:
            - configMapRef:
                name: {{ include "palaceoftruth.fullname" . }}-config
            - secretRef:
                name: {{ include "palaceoftruth.appSecretName" . }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
{{- end }}
