{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "palaceoftruth.appSecretName" . }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ include "palaceoftruth.appSecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: openai-api-key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: openrouter-api-key
    - secretKey: API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: api-key
    - secretKey: PALACEOFTRUTH_ADMIN_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: admin-secret
    {{- if .Values.externalSecrets.githubPatProperty }}
    - secretKey: GITHUB_PAT
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.githubPatProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.syncSourceCredentialKeyProperty }}
    - secretKey: PALACEOFTRUTH_SYNC_SOURCE_CREDENTIAL_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.syncSourceCredentialKeyProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.facebookOembedAccessTokenProperty }}
    - secretKey: FACEBOOK_OEMBED_ACCESS_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.facebookOembedAccessTokenProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.embeddingLocalHttpApiKeyProperty }}
    - secretKey: EMBEDDING_LOCAL_HTTP_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.embeddingLocalHttpApiKeyProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.assemblyaiApiKeyProperty }}
    - secretKey: ASSEMBLYAI_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.assemblyaiApiKeyProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.firecrawlApiKeyProperty }}
    - secretKey: FIRECRAWL_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.appSecretItemId }}
        property: {{ .Values.externalSecrets.firecrawlApiKeyProperty }}
    {{- end }}
    {{- if .Values.externalSecrets.s3CredentialsItemId }}
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecrets.s3CredentialsItemId }}
        property: {{ .Values.externalSecrets.s3AccessKeyProperty }}
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.s3CredentialsItemId }}
        property: {{ .Values.externalSecrets.s3SecretKeyProperty }}
    {{- if .Values.externalSecrets.s3SessionTokenProperty }}
    - secretKey: AWS_SESSION_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.s3CredentialsItemId }}
        property: {{ .Values.externalSecrets.s3SessionTokenProperty }}
    {{- end }}
    {{- end }}
{{- end }}
