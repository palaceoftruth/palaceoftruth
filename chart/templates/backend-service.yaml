apiVersion: v1
kind: Service
metadata:
  name: {{ include "palaceoftruth.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
    app: {{ include "palaceoftruth.fullname" . }}-backend
  {{- if .Values.metrics.serviceAnnotations }}
  annotations:
    {{- toYaml .Values.metrics.serviceAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "palaceoftruth.fullname" . }}-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
