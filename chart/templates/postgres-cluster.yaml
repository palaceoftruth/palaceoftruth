{{- if .Values.postgres.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "palaceoftruth.postgresClusterName" . }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  instances: {{ include "palaceoftruth.postgresInstances" . }}
  imageName: {{ .Values.postgres.image }}
  {{- if .Values.postgres.backup.enabled }}
  plugins:
    - name: {{ required "postgres.backup.pluginName is required when postgres.backup.enabled=true" .Values.postgres.backup.pluginName | quote }}
      isWALArchiver: true
      parameters:
        barmanObjectName: {{ default (printf "%s-backup" (include "palaceoftruth.postgresClusterName" .)) .Values.postgres.backup.objectStore.name | quote }}
  {{- end }}

  storage:
    size: {{ .Values.postgres.storage.size }}

  {{- with .Values.postgres.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  {{- if .Values.postgres.monitoring.customQueries.enabled }}
  monitoring:
    customQueriesConfigMap:
      - name: {{ include "palaceoftruth.postgresClusterName" . }}-monitoring
        key: custom-queries
  {{- end }}

  postgresql:
    parameters:
      {{- range $name, $value := .Values.postgres.parameters }}
      {{ $name }}: {{ $value | quote }}
      {{- end }}

  bootstrap:
    initdb:
      database: palaceoftruth
      owner: palaceoftruth
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS "vector"
{{- end }}
