{{- if and .Values.postgres.enabled .Values.postgres.monitoring.podMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ include "palaceoftruth.postgresClusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
    {{- with .Values.postgres.monitoring.podMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: {{ include "palaceoftruth.postgresClusterName" . }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.postgres.monitoring.podMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.postgres.monitoring.podMonitor.scrapeTimeout | quote }}
{{- end }}
