{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "palaceoftruth.registrySecretName" . }}
  labels:
    {{- include "palaceoftruth.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ include "palaceoftruth.registrySecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ `{{` }} index . "docker-server" {{ `}}` }}": {
                "username": "{{ `{{` }} index . "docker-username" {{ `}}` }}",
                "password": "{{ `{{` }} index . "docker-password" {{ `}}` }}",
                "auth": "{{ `{{` }} printf "%s:%s" (index . "docker-username") (index . "docker-password") | b64enc {{ `}}` }}"
              }
            }
          }
  data:
    - secretKey: docker-server
      remoteRef:
        key: {{ .Values.externalSecrets.registrySecretItemId }}
        property: server-url
    - secretKey: docker-username
      remoteRef:
        key: {{ .Values.externalSecrets.registrySecretItemId }}
        property: default-pull-username
    - secretKey: docker-password
      remoteRef:
        key: {{ .Values.externalSecrets.registrySecretItemId }}
        property: default-pull-password
{{- end }}
