name: Build and Push Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-push-main
  cancel-in-progress: false

env:
  REGISTRY_HOST: ghcr.io
  REGISTRY_NAMESPACE: palaceoftruth/palaceoftruth

jobs:
  validate:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: palace
          POSTGRES_PASSWORD: palace
          POSTGRES_DB: palace_plan_gate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U palace -d palace_plan_gate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run backend smoke tests
        working-directory: backend
        run: |
          uv run --python 3.12 --with pytest --with pytest-asyncio python -m pytest \
            tests/test_config.py \
            tests/test_main_startup.py \
            tests/test_database_health.py \
            tests/test_detect_hermes_plugin_release.py \
            tests/test_agent_plugin_release.py \
            tests/test_agent_plugin_manifests.py \
            tests/test_retrieval_replay.py \
            tests/test_search.py \
            tests/test_memory_service.py \
            -q
          PLAN_GATE_DATABASE_URL=postgresql://palace:palace@localhost:5432/palace_plan_gate \
            uv run --python 3.12 --with pytest --with pytest-asyncio python -m pytest \
            tests/test_retrieval_query_plans.py -q
          uv run --python 3.12 python ../scripts/check_database_health.py
          uv run --python 3.12 python ../scripts/replay_retrieval_capture.py gate \
            --baseline tests/fixtures/retrieval_replay/baseline.ndjson \
            --current tests/fixtures/retrieval_replay/current.ndjson \
            --top-k 2 \
            --min-jaccard 1.0 \
            --latency-delta-warn-ms 250
          mkdir -p ../artifacts/retrieval-replay
          uv run --python 3.12 python ../scripts/replay_retrieval_capture.py generate-currentness \
            --output ../artifacts/retrieval-replay/currentness_current.ndjson
          uv run --python 3.12 python ../scripts/replay_retrieval_capture.py compare \
            --baseline tests/fixtures/retrieval_replay/currentness_baseline.ndjson \
            --current ../artifacts/retrieval-replay/currentness_current.ndjson \
            --top-k 5 --min-jaccard 0 --min-recall 1 --min-mrr 0.98 --min-ndcg 0.98 \
            --latency-delta-warn-ms 3000 \
            --fail-on-forbidden --require-expected-scope --require-capture-metadata \
            --required-capture-set currentness-regression \
            --require-current-source-ranking-mode currentness-aware

      - name: Generate CI-safe agent memory reports
        working-directory: backend
        run: |
          mkdir -p ../artifacts/agent-memory
          uv run --python 3.12 --with pytest --with pytest-asyncio python -m pytest \
            tests/test_agent_memory_compatibility_smoke.py \
            -q
          uv run --python 3.12 python ../scripts/smoke_agent_memory_compatibility.py \
            codex-bridge \
            --output ../artifacts/agent-memory/codex-bridge.json
          uv run --python 3.12 python ../scripts/smoke_agent_memory_compatibility.py \
            scorecard \
            --dry-run \
            --redact-memory-bodies \
            --output ../artifacts/agent-memory/scorecard-dry-run.json

      - name: Upload agent memory reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agent-memory-ci-reports
          path: artifacts/agent-memory/*.json
          if-no-files-found: error

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Validate Helm chart
        run: |
          helm lint chart
          helm template palaceoftruth chart
          helm template palaceoftruth chart --set highAvailability.enabled=true
          helm template palaceoftruth chart --set mcp.enabled=true --set ingress.mcpHost=mcp.palaceoftruth.example.com

  build-push:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect Hermes plugin release inputs
        id: hermes_plugin
        run: |
          VERSION=$(python3 scripts/package_hermes_memory_plugin.py --print-version)
          TAG="hermes-memory-plugin-v${VERSION}"
          ASSET_BASE="palaceoftruth-hermes-memory-plugin-v${VERSION}"
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=true
          elif git diff --name-only "$BEFORE" "$GITHUB_SHA" -- third_party_plugins/hermes/memory/palaceoftruth scripts/package_hermes_memory_plugin.py | grep -q .; then
            CHANGED=$(python3 scripts/detect_hermes_plugin_release.py --before "$BEFORE" --after "$GITHUB_SHA")
          else
            CHANGED=false
          fi
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "asset_base=${ASSET_BASE}"
            echo "changed=${CHANGED}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Read release coordinates
        id: release
        run: |
          CHART_NAME=$(awk '$1 == "name:" { print $2; exit }' chart/Chart.yaml)
          BACKEND_REPO=$(awk '$1 == "backendRepository:" { print $2; exit }' chart/values.yaml)
          FRONTEND_REPO=$(awk '$1 == "frontendRepository:" { print $2; exit }' chart/values.yaml)
          if [ -z "$CHART_NAME" ] || [ -z "$BACKEND_REPO" ] || [ -z "$FRONTEND_REPO" ]; then
            echo "Failed to read release coordinates from chart metadata" >&2
            exit 1
          fi
          {
            echo "chart_name=${CHART_NAME}"
            echo "backend_image=${{ env.REGISTRY_HOST }}/${BACKEND_REPO}"
            echo "frontend_image=${{ env.REGISTRY_HOST }}/${FRONTEND_REPO}"
            echo "hermes_plugin_image=${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_NAMESPACE }}/hermes-memory-plugin"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.release.outputs.backend_image }}:${{ steps.tag.outputs.sha }}
            ${{ steps.release.outputs.backend_image }}:latest
          cache-from: type=registry,ref=${{ steps.release.outputs.backend_image }}:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.release.outputs.frontend_image }}:${{ steps.tag.outputs.sha }}
            ${{ steps.release.outputs.frontend_image }}:latest
          cache-from: type=registry,ref=${{ steps.release.outputs.frontend_image }}:latest
          cache-to: type=inline

      - name: Build and push Hermes plugin artifact
        if: steps.hermes_plugin.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./third_party_plugins/hermes/memory/palaceoftruth
          file: ./third_party_plugins/hermes/memory/palaceoftruth/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.release.outputs.hermes_plugin_image }}:${{ steps.tag.outputs.sha }}
            ${{ steps.release.outputs.hermes_plugin_image }}:latest
          cache-from: type=registry,ref=${{ steps.release.outputs.hermes_plugin_image }}:latest
          cache-to: type=inline

      - name: Package Hermes plugin release assets
        if: steps.hermes_plugin.outputs.changed == 'true'
        run: |
          python3 scripts/package_hermes_memory_plugin.py --output-dir /tmp/hermes-plugin-release

      - name: Create Hermes plugin GitHub release
        if: steps.hermes_plugin.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HERMES_PLUGIN_TAG: ${{ steps.hermes_plugin.outputs.tag }}
          HERMES_PLUGIN_VERSION: ${{ steps.hermes_plugin.outputs.version }}
          HERMES_PLUGIN_ASSET_BASE: ${{ steps.hermes_plugin.outputs.asset_base }}
          HERMES_PLUGIN_IMAGE_TAG: ${{ steps.tag.outputs.sha }}
          HERMES_PLUGIN_IMAGE: ${{ steps.release.outputs.hermes_plugin_image }}
        run: |
          if gh release view "$HERMES_PLUGIN_TAG" >/dev/null 2>&1; then
            echo "Release $HERMES_PLUGIN_TAG already exists. Bump third_party_plugins/hermes/memory/palaceoftruth/plugin.yaml before merging plugin updates." >&2
            exit 1
          fi
          cat > /tmp/hermes-plugin-release/RELEASE_NOTES.md <<EOF
          Hermes memory plugin release for Palace of Truth.

          Version: ${HERMES_PLUGIN_VERSION}
          Commit: ${GITHUB_SHA}
          Container artifact: ${HERMES_PLUGIN_IMAGE}:${HERMES_PLUGIN_IMAGE_TAG}

          Assets:
          - ${HERMES_PLUGIN_ASSET_BASE}.tar.gz
          - ${HERMES_PLUGIN_ASSET_BASE}.zip
          - ${HERMES_PLUGIN_ASSET_BASE}.json
          - ${HERMES_PLUGIN_ASSET_BASE}.sha256
          EOF
          gh release create "$HERMES_PLUGIN_TAG" \
            "/tmp/hermes-plugin-release/${HERMES_PLUGIN_ASSET_BASE}.tar.gz" \
            "/tmp/hermes-plugin-release/${HERMES_PLUGIN_ASSET_BASE}.zip" \
            "/tmp/hermes-plugin-release/${HERMES_PLUGIN_ASSET_BASE}.json" \
            "/tmp/hermes-plugin-release/${HERMES_PLUGIN_ASSET_BASE}.sha256" \
            --title "Hermes Memory Plugin v${HERMES_PLUGIN_VERSION}" \
            --notes-file /tmp/hermes-plugin-release/RELEASE_NOTES.md

  publish-agent-plugin:
    needs: validate
    if: github.event_name == 'push'
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect agent-client plugin release inputs
        id: release
        run: |
          VERSION=$(python3 scripts/package_agent_memory_plugin.py --print-version)
          BEFORE="${{ github.event.before }}"
          CHANGED=$(python3 scripts/detect_agent_plugin_release.py --before "$BEFORE" --after "$GITHUB_SHA")
          {
            echo "version=${VERSION}"
            echo "tag=agent-memory-plugin-v${VERSION}"
            echo "asset_base=palaceoftruth-agent-memory-plugin-v${VERSION}"
            echo "changed=${CHANGED}"
          } >> "$GITHUB_OUTPUT"

      - name: Package deterministic release assets
        if: steps.release.outputs.changed == 'true'
        run: |
          SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$GITHUB_SHA") \
            python3 scripts/package_agent_memory_plugin.py --output-dir /tmp/agent-plugin-release

      - name: Create immutable agent-client release
        if: steps.release.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          ASSET_BASE: ${{ steps.release.outputs.asset_base }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Bump both agent-client plugin manifests before merging package changes." >&2
            exit 1
          fi
          cat > /tmp/agent-plugin-release/RELEASE_NOTES.md <<EOF
          Palace agent-client memory plugin release.

          Version: ${VERSION}
          Commit: ${GITHUB_SHA}
          Install marketplace: palaceoftruth/palaceoftruth at ${TAG}
          Verify the published SHA-256 file before installation.
          EOF
          gh release create "$TAG" \
            "/tmp/agent-plugin-release/${ASSET_BASE}.tar.gz" \
            "/tmp/agent-plugin-release/${ASSET_BASE}.zip" \
            "/tmp/agent-plugin-release/${ASSET_BASE}.json" \
            "/tmp/agent-plugin-release/${ASSET_BASE}.sha256" \
            --target "$GITHUB_SHA" \
            --title "Palace Agent Memory Plugin v${VERSION}" \
            --notes-file /tmp/agent-plugin-release/RELEASE_NOTES.md
          TAG_SHA=$(git ls-remote origin "refs/tags/${TAG}^{}" | awk '{print $1}')
          if [ -z "$TAG_SHA" ]; then
            TAG_SHA=$(git ls-remote origin "refs/tags/${TAG}" | awk '{print $1}')
          fi
          if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "Release tag $TAG resolved to $TAG_SHA, expected $GITHUB_SHA." >&2
            exit 1
          fi

  publish-chart:
    needs: build-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect chart-only release bump
        id: release_scope
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$GITHUB_SHA")
          if [ -n "$CHANGED_FILES" ] && ! printf '%s\n' "$CHANGED_FILES" | grep -vx 'chart/Chart.yaml' >/dev/null; then
            echo "Skipping chart publish for chart-only release-coordinate update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Read chart name
        if: steps.release_scope.outputs.skip != 'true'
        id: chart
        run: |
          CHART_NAME=$(awk '$1 == "name:" { print $2; exit }' chart/Chart.yaml)
          if [ -z "$CHART_NAME" ]; then
            echo "Failed to read chart name from chart/Chart.yaml" >&2
            exit 1
          fi
          echo "name=${CHART_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        if: steps.release_scope.outputs.skip != 'true'
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Log in to GHCR
        if: steps.release_scope.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish chart and prepare release-coordinate PR
        if: steps.release_scope.outputs.skip != 'true'
        id: version
        env:
          RELEASE_PR_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
        run: |
          if [ -z "$RELEASE_PR_TOKEN" ]; then
            echo "RELEASE_PR_TOKEN is required to push a chart release branch and open a PR." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_PR_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          for attempt in 1 2 3 4 5; do
            echo "Chart release attempt ${attempt}"
            git fetch origin main
            RELEASE_BRANCH="ci/chart-release-${GITHUB_SHA::8}"
            git checkout -B "$RELEASE_BRANCH" origin/main

            CHART_RELEASE_BRANCHES=$(gh pr list \
              --base main \
              --state open \
              --limit 100 \
              --json headRefName \
              --jq '.[] | select(.headRefName | startswith("ci/chart-release-")) | .headRefName')
            RESERVED_VERSION_ARGS=()
            while IFS= read -r RELEASE_PR_BRANCH; do
              if [ -z "$RELEASE_PR_BRANCH" ] || [ "$RELEASE_PR_BRANCH" = "$RELEASE_BRANCH" ]; then
                continue
              fi

              git fetch origin "refs/heads/${RELEASE_PR_BRANCH}:refs/remotes/origin/${RELEASE_PR_BRANCH}"
              RESERVED_VERSION=$(git show "refs/remotes/origin/${RELEASE_PR_BRANCH}:chart/Chart.yaml" \
                | awk '$1 == "version:" { gsub(/"/, "", $2); print $2; exit }')
              if [ -n "$RESERVED_VERSION" ]; then
                RESERVED_VERSION_ARGS+=(--reserved-version "$RESERVED_VERSION")
              fi
            done <<< "$CHART_RELEASE_BRANCHES"

            VERSION=$(python3 scripts/bump_chart_release.py --app-version "${GITHUB_SHA::8}" "${RESERVED_VERSION_ARGS[@]}")
            git add chart/Chart.yaml
            git commit -m "chore(ci): bump chart to ${VERSION}"

            git fetch origin main
            if ! git rebase origin/main; then
              echo "Main advanced during chart bump; retrying from latest origin/main" >&2
              git rebase --abort || true
              sleep $((attempt * 2))
              continue
            fi

            helm package chart/ --destination /tmp/charts
            helm push "/tmp/charts/${{ steps.chart.outputs.name }}-${VERSION}.tgz" \
              oci://${{ env.REGISTRY_HOST }}/${{ env.REGISTRY_NAMESPACE }}

            if git ls-remote --exit-code --heads origin "$RELEASE_BRANCH" >/dev/null 2>&1; then
              git fetch origin "$RELEASE_BRANCH"
              PUSH_COMMAND=(git push --force-with-lease="refs/heads/${RELEASE_BRANCH}" origin "${RELEASE_BRANCH}:${RELEASE_BRANCH}")
            else
              PUSH_COMMAND=(git push origin "${RELEASE_BRANCH}:${RELEASE_BRANCH}")
            fi

            if "${PUSH_COMMAND[@]}"; then
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "branch=${RELEASE_BRANCH}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Failed to push chart release branch; retrying with a freshly computed chart version" >&2
            sleep $((attempt * 2))
          done

          echo "Failed to publish chart release branch after 5 attempts" >&2
          exit 1

      - name: Open chart release PR
        if: steps.release_scope.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PR_TOKEN }}
          RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -z "$RELEASE_BRANCH" ] || [ -z "$RELEASE_VERSION" ]; then
            echo "Missing chart release PR coordinates" >&2
            exit 1
          fi

          PR_URL=$(gh pr list \
            --base main \
            --head "$RELEASE_BRANCH" \
            --state open \
            --json url \
            --jq '.[0].url // ""')

          BODY=$(cat <<EOF
          ## Summary

          Records Helm chart release ${RELEASE_VERSION} for ${GITHUB_SHA::8}.

          ## Notes

          The chart package was published by workflow run ${GITHUB_RUN_ID}. This PR records the release coordinates in chart/Chart.yaml without bypassing main branch protection.
          EOF
          )

          if [ -n "$PR_URL" ]; then
            gh pr edit "$PR_URL" \
              --title "chore(ci): bump chart to ${RELEASE_VERSION}" \
              --body "$BODY"
            echo "Updated existing chart release PR: ${PR_URL}"
          else
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(ci): bump chart to ${RELEASE_VERSION}" \
              --body "$BODY"
          fi

      - name: Close superseded chart release PRs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_RELEASE_BRANCH: ${{ steps.version.outputs.branch }}
          NEW_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          SUPERSEDING_VERSION="$NEW_RELEASE_VERSION"
          if [ -z "$SUPERSEDING_VERSION" ]; then
            SUPERSEDING_VERSION=$(awk '$1 == "version:" { gsub(/"/, "", $2); print $2; exit }' chart/Chart.yaml)
          fi

          if [ -z "$SUPERSEDING_VERSION" ]; then
            echo "::warning::Unable to determine the superseding chart version; skipping stale chart release PR cleanup."
            exit 0
          fi

          CHART_RELEASE_PRS=$(gh pr list \
            --base main \
            --state open \
            --limit 100 \
            --json number,headRefName,url \
            --jq '.[] | select(.headRefName | startswith("ci/chart-release-")) | [.number, .headRefName, .url] | @tsv')

          if [ -z "$CHART_RELEASE_PRS" ]; then
            echo "No open chart release PRs to check."
            exit 0
          fi

          while IFS=$'\t' read -r PR_NUMBER RELEASE_PR_BRANCH PR_URL; do
            if [ -z "$PR_NUMBER" ] || [ -z "$RELEASE_PR_BRANCH" ]; then
              continue
            fi

            if [ -n "$CURRENT_RELEASE_BRANCH" ] && [ "$RELEASE_PR_BRANCH" = "$CURRENT_RELEASE_BRANCH" ]; then
              continue
            fi

            if ! git fetch origin "refs/heads/${RELEASE_PR_BRANCH}:refs/remotes/origin/${RELEASE_PR_BRANCH}"; then
              echo "::warning::Unable to fetch ${RELEASE_PR_BRANCH}; skipping ${PR_URL}."
              continue
            fi

            RELEASE_PR_VERSION=$(git show "refs/remotes/origin/${RELEASE_PR_BRANCH}:chart/Chart.yaml" \
              | awk '$1 == "version:" { gsub(/"/, "", $2); print $2; exit }')
            if [ -z "$RELEASE_PR_VERSION" ]; then
              echo "::warning::Unable to read chart version from ${RELEASE_PR_BRANCH}; skipping ${PR_URL}."
              continue
            fi

            for CHART_VERSION in "$RELEASE_PR_VERSION" "$SUPERSEDING_VERSION"; do
              if ! printf '%s\n' "$CHART_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "::warning::Unable to compare chart versions ${RELEASE_PR_VERSION} and ${SUPERSEDING_VERSION}; skipping ${PR_URL}."
                continue 2
              fi
            done

            NEWEST_VERSION=$(printf '%s\n%s\n' "$RELEASE_PR_VERSION" "$SUPERSEDING_VERSION" | sort -V | tail -n 1)
            # Close release-coordinate PRs that cannot be merged without going backwards or duplicating main.
            if [ "$NEWEST_VERSION" = "$SUPERSEDING_VERSION" ]; then
              if gh pr close "$PR_NUMBER" \
                --comment "Closing because chart release ${RELEASE_PR_VERSION} has been superseded by chart release ${SUPERSEDING_VERSION}."; then
                echo "Closed superseded chart release PR ${PR_URL}."
              else
                echo "::warning::Failed to close superseded chart release PR ${PR_URL}."
              fi
            else
              echo "Keeping ${PR_URL}; chart release ${RELEASE_PR_VERSION} is newer than ${SUPERSEDING_VERSION}."
            fi
          done <<< "$CHART_RELEASE_PRS"
